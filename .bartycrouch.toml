[update]
tasks = ["code", "normalize"]

[update.code]
codePaths = ["."]
localizablePaths = ["Resources"]
defaultToKeys = true
additive = false
unstripped = false
plistArguments = false
ignoreKeys = ["#bartycrouch-ignore!", "#bc-ignore!", "#i!"]

[update.normalize]
paths = ["Resources"]
subpathsToIgnore = ["InfoPlist.strings"]
sourceLocale = "en"
harmonizeWithSource = true
sortByKeys = true

[lint]
paths = ["Resources"]
duplicateKeys = true
emptyValues = true
